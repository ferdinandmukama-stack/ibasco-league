<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ibasco League</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f19;
    color: white;
}

/* HERO */
.hero {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("https://images.unsplash.com/photo-1522778119026-d647f0596c20");
    background-size: cover;
    background-position: center;
    text-align: center;
    padding: 90px 20px;
}

.hero h1 { font-size: 42px; margin: 0; }
.hero p { opacity: 0.8; margin-top: 10px; }

/* BUTTONS */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 10px 18px;
    background: #ffcc00;
    color: black;
    font-weight: bold;
    border-radius: 6px;
    text-decoration: none;
}
.btn:hover { background: white; }

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1c2233;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

/* FEATURE */
.feature {
    background: linear-gradient(135deg, #0d47a1, #1a237e);
    padding: 25px;
    margin: 20px;
    border-radius: 12px;
    text-align: center;
}

footer {
    background: #0d47a1;
    text-align: center;
    padding: 10px;
    margin-top: 30px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Ibasco Football League</h1>
    <p>Where Local Football Meets Excellence</p>

    <a href="teams.html" class="btn">Teams</a>
    <a href="fixtures.html" class="btn">Fixtures</a>
    <a href="table.html" class="btn">Table</a>
</div>

<!-- DASHBOARD -->
<div class="grid">

    <div class="card">
        <h2>15</h2>
        <p>Teams</p>
    </div>

    <div class="card">
        <h2 id="matchesPlayed">0</h2>
        <p>Matches Played</p>
    </div>

    <div class="card">
        <h2>3</h2>
        <p>Today Matches</p>
    </div>

    <div class="card">
        <h2>2026</h2>
        <p>Season</p>
    </div>

</div>

<!-- FEATURE MATCH -->
<div class="feature">
    <h2>🔥 Featured Match (Live)</h2>
    <p id="latestMatch">Loading match...</p>
</div>

<footer>
    <p>© 2026 Ibasco League</p>
</footer>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot,
    query,
    orderBy,
    limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "ibasco-league-project.firebaseapp.com",
  projectId: "ibasco-league-project",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 LIVE MATCH LOADING */
const matchesRef = collection(db, "matches");

/* REAL-TIME UPDATE FIX */
onSnapshot(matchesRef, (snapshot) => {

    let matches = [];

    snapshot.forEach(doc => {
        matches.push(doc.data());
    });

    // total matches
    document.getElementById("matchesPlayed").innerText = matches.length;

    // latest match
    if (matches.length > 0) {
        let latest = matches[matches.length - 1];

        document.getElementById("latestMatch").innerHTML =
        `<b>${latest.teamA}</b> ${latest.scoreA} - ${latest.scoreB} <b>${latest.teamB}</b>`;
    } else {
        document.getElementById("latestMatch").innerText = "No matches yet";
    }
});

</script>

</body>
</html>
