<!DOCTYPE html>
<html>
<head>
    <title>League Table</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        h1 {
            background: #1e3a8a;
            color: white;
            padding: 15px;
            text-align: center;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            background: #1e3a8a;
            color: white;
        }
    </style>
</head>
<body>

<h1>🏆 League Table</h1>

<table>
    <tr>
        <th>#</th>
        <th>Team</th>
        <th>MP</th>
        <th>W</th>
        <th>D</th>
        <th>L</th>
        <th>GF</th>
        <th>GA</th>
        <th>GD</th>
        <th>Points</th>
    </tr>

    {% for row in table %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ row.team.name }}</td>
        <td>{{ row.played }}</td>
        <td>{{ row.wins }}</td>
        <td>{{ row.draws }}</td>
        <td>{{ row.losses }}</td>
        <td>{{ row.gf }}</td>
        <td>{{ row.ga }}</td>
        <td>{{ row.gd }}</td>
        <td>{{ row.points }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
