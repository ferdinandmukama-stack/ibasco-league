<!DOCTYPE html>
<html>
<head>
    <title>Top Scorers</title>
</head>
<body>

<h1>⚽ Top Scorers</h1>

<table border="1" width="60%" align="center">
    <tr>
        <th>#</th>
        <th>Player</th>
        <th>Team</th>
        <th>Goals</th>
    </tr>

    {% for player in players %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ player.name }}</td>
        <td>{{ player.team }}</td>
        <td>{{ player.goals }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
