<!DOCTYPE html>
<html>
<head>
    <title>Teams - Ibasco League</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        h1 {
            background: #1e3a8a;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>⚽ Teams</h1>

<div class="container">
    {% for team in teams %}
    <div style="display:flex; align-items:center; gap:10px; margin:10px;">
        
        {% if team.logo %}
            <img src="{{ team.logo.url }}" width="40" height="40">
        {% else %}
            <span>⚽</span>
        {% endif %}

        <strong>{{ team.name }}</strong>
    </div>
{% endfor %}
</div>

</body>
</html>
