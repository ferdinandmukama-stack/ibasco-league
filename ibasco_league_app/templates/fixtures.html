<!DOCTYPE html>
<html>
<head>
    <title>Fixtures</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        h1 {
            background: #1e3a8a;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .match {
            background: white;
            margin: 15px auto;
            padding: 15px;
            width: 80%;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .score {
            font-size: 20px;
            font-weight: bold;
        }

        .date {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h1>⚽ Fixtures</h1>

{% for match in matches %}
    {% for match in matches %}
    <div style="display:flex; align-items:center; gap:10px; margin:10px;">

    {% if match.home_team.logo %}
        <img src="{{ match.home_team.logo.url }}" width="30">
    {% endif %}

    <strong>{{ match.home_team }}</strong>

    <span>{{ match.home_score }} - {{ match.away_score }}</span>

    <strong>{{ match.away_team }}</strong>

    {% if match.away_team.logo %}
        <img src="{{ match.away_team.logo.url }}" width="30">
    {% endif %}

    <!-- LIVE TIME -->
    <span style="color:red;">
        {{ match.live_time }}
    </span>

</div>
{% endfor %}
{% endfor %}
<script>
    setInterval(function () {
        location.reload();
    }, 10000); // 10000ms = 10 seconds
</script>

</body>
</html>
